<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Many Many Games - Game Launcher</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .header-subtitle {
      font-size: 1.1em;
      opacity: 0.95;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .search-box {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      width: 300px;
      max-width: 100%;
      font-size: 1em;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .refresh-btn {
      padding: 10px 25px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #667eea;
      font-weight: bold;
      cursor: pointer;
      font-size: 1em;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
    }

    .refresh-btn:active {
      transform: translateY(0);
    }

    .refresh-btn.loading {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .game-count {
      text-align: center;
      color: white;
      margin-bottom: 20px;
      font-size: 1.1em;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 40px;
    }

    .game-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .game-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    .game-card-content {
      padding: 20px;
      text-align: center;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-card-title {
      font-size: 1.1em;
      color: #333;
      font-weight: 600;
      word-break: break-word;
    }

    .game-card:hover .game-card-title {
      color: #667eea;
    }

    .empty-state {
      text-align: center;
      color: white;
      padding: 60px 20px;
    }

    .empty-state h2 {
      font-size: 2em;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      color: white;
      padding: 60px 20px;
    }

    .loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% {
        content: '';
      }
      40% {
        content: '.';
      }
      60% {
        content: '..';
      }
      80%, 100% {
        content: '...';
      }
    }

    .no-results {
      text-align: center;
      color: white;
      padding: 60px 20px;
      font-size: 1.3em;
    }

    footer {
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      padding: 20px;
      font-size: 0.9em;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2em;
      }

      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
      }

      .search-box {
        width: 100%;
      }

      .controls {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

        placeholder="Games base URL (e.g. ./html/ or https://cdn.example.com/games/)"

    function formatGameTitle(filename) {
      const name = filename.replace(/\.(html|htm)$/i, '');
      let formatted = name.replace(/[-_]/g, ' ');
      formatted = formatted
        .split(' ')
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(' ');
      return formatted;
    }

    async function loadGames() {
      const container = document.getElementById('gamesContainer');
      const countEl = document.getElementById('gameCount');
      const refreshBtn = document.getElementById('refreshBtn');

      try {
        refreshBtn.classList.add('loading');
        refreshBtn.disabled = true;

        // Try to load from API first, fall back to hardcoded list
        let games = [];
        try {
          const response = await fetch('/api/games');
          if (response.ok) {
            games = await response.json();
          }
        } catch (e) {
          console.log('API not available, using hardcoded list');
        }

        // If API didn't work, try folder-games.js first, then fall back to hardcoded list
        if (games.length === 0 && Array.isArray(window.folderGames) && window.folderGames.length > 0) {
          games = folderGames.map(file => ({
            title: formatGameTitle(file),
            filename: file
          })).sort((a, b) => a.title.localeCompare(b.title));
        } else if (games.length === 0) {
          games = GAME_LIST.map(file => ({
            title: formatGameTitle(file),
            filename: file
          })).sort((a, b) => a.title.localeCompare(b.title));
        }

        allGames = games;
        filteredGames = [...allGames];

        countEl.textContent = `${allGames.length} game${allGames.length !== 1 ? 's' : ''} available`;
        renderGames(filteredGames);
      } catch (error) {
        console.error('Error loading games:', error);
        container.innerHTML = `
          <div class="empty-state">
            <h2>⚠️ Error Loading Games</h2>
            <p>${error.message}</p>
          </div>
        `;
      } finally {
        refreshBtn.classList.remove('loading');
        refreshBtn.disabled = false;
      }
    }

    function renderGames(games) {
      const container = document.getElementById('gamesContainer');

      if (games.length === 0) {
        container.innerHTML = `
          <div class="no-results">
            <h2>No games found</h2>
            <p>Try a different search term</p>
          </div>
        `;
        return;
      }

      container.innerHTML = games.map(game => `
        <div class="game-card" onclick="playGame('${(game.filename || game.path).replace(/'/g, "\\'")}', '${game.title.replace(/'/g, "\\'")}')">
          <div class="game-card-content">
            <div class="game-card-title">${game.title}</div>
          </div>
        </div>
      `).join('');
    }

    function playGame(path, title) {
      // `path` is a filename (e.g. "game.html") or an absolute URL
      const base = getBaseUrl();
      let finalUrl = path;
      // If path is a bare filename (no protocol or leading slash), build using base
      if (!/^(https?:)?\/\//i.test(path) && !path.startsWith('/')) {
        let b = base || './html/';
        if (!b.endsWith('/')) b += '/';
        finalUrl = b + encodeURIComponent(path);
      }
      window.open(finalUrl, '_blank');
    }

    function getBaseUrl() {
      return localStorage.getItem('manygames_base_url') || './html/';
    }

    function saveBaseUrl(val) {
      if (!val) localStorage.removeItem('manygames_base_url');
      else localStorage.setItem('manygames_base_url', val);
    }

    function filterGames(query) {
      const searchTerm = query.toLowerCase().trim();

      if (!searchTerm) {
        filteredGames = [...allGames];
      } else {
        filteredGames = allGames.filter(game =>
          game.title.toLowerCase().includes(searchTerm)
        );
      }

      renderGames(filteredGames);
    }

    // Event listeners
    document.getElementById('searchBox').addEventListener('input', (e) => {
      filterGames(e.target.value);
    });

    document.getElementById('refreshBtn').addEventListener('click', loadGames);

    // Base URL input: initialize and listen for changes
    const baseInput = document.getElementById('baseUrl');
    if (baseInput) {
      baseInput.value = getBaseUrl();
      baseInput.addEventListener('change', (e) => {
        saveBaseUrl(e.target.value.trim());
        // re-render in case paths changed
        loadGames();
      });
    }

    // Load games on page load
    loadGames();

    // Auto-refresh games every 5 seconds to catch new additions
    setInterval(() => {
      fetch(GAMES_API)
        .then(res => res.json())
        .then(games => {
          if (games.length !== allGames.length) {
            allGames = games;
            filterGames(document.getElementById('searchBox').value);
            document.getElementById('gameCount').textContent = 
              `${allGames.length} game${allGames.length !== 1 ? 's' : ''} available`;
          }
        })
        .catch(err => console.log('Auto-refresh check failed:', err));
    }, 5000);
